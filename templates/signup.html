<form method="post">
  {% csrf_token %}
  <input name="username" placeholder="Username"><br>
  <input name="password" type="password"><br>
  <select name="role">
    <option value="student">Student</option>
    <option value="organizer">Organizer</option>
  </select>
  <button type="submit">Signup</button>
</form>
